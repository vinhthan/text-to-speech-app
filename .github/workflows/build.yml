name: Build & Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle 8.4
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version=8.4

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Write local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Install required SDK platforms
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Rename APK
        run: |
          mkdir -p release
          cp app/build/outputs/apk/debug/app-debug.apk \
             release/TextToSpeech-v${{ github.run_number }}.apk

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: TextToSpeech-debug-v${{ github.run_number }}
          path: release/*.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "TextToSpeech v${{ github.run_number }}"
          body: |
            ## 🔊 Text to Speech Android App — Debug Build

            ### Cách cài đặt trên điện thoại:
            1. **Tải file** `TextToSpeech-v${{ github.run_number }}.apk` bên dưới (mục **Assets**)
            2. Trên điện thoại vào **Cài đặt → Bảo mật → Bật "Nguồn không xác định"**
               _(Android 8+: khi mở APK sẽ tự hỏi, chọn "Cho phép")_
            3. Mở file APK vừa tải → nhấn **Cài đặt**
            4. Yêu cầu: **Android 7.0+** và **Google Text-to-Speech** (hầu hết đã có sẵn)

            ### Tính năng:
            - 🇻🇳🇺🇸 Đọc tiếng Việt & tiếng Anh (tự nhận diện ngôn ngữ)
            - 📂 Mở file TXT, PDF, DOCX, ODT, RTF
            - ⚡ Điều chỉnh tốc độ 0.1x – 4.0x (bước ±0.1x)
            - ⏸ Play / Pause / Stop — nhớ vị trí khi tạm dừng
            - 🔖 Bookmark vị trí đọc (tối đa 50 bookmark)
            - 📋 Lịch sử file đã đọc (30 mục gần nhất)
            - 🌙 Dark mode / Light mode
          files: release/*.apk
          draft: false
          prerelease: false
